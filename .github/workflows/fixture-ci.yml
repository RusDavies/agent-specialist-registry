name: Public showcase fixture CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  fixture-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Run fixture checks
        run: ./scripts/ci_check.sh

